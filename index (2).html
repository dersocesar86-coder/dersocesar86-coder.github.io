<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="PERFORMANCE"/>
<meta name="theme-color" content="#1A1C1E"/>
<link rel="manifest" href="/manifest.json"/>
<link rel="icon" type="image/svg+xml" href="/icon.svg"/>
<link rel="apple-touch-icon" href="/icon.svg"/>
<title>PERFORMANCE</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

:root{
  --bg:       #1A1C1E;
  --surface:  #22262A;
  --surface2: #2A2F34;
  --border:   rgba(255,255,255,0.07);
  --cyan:     #00D1FF;
  --cdim:     rgba(0,209,255,0.10);
  --text:     #F0F4F8;
  --muted:    #7A8A98;
  --green:    #00E899;
  --red:      #FF5A5A;
  --warn:     #FFB830;
  --r:        10px;
  --rs:       6px;
}

body{
  font-family:'Outfit',sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100dvh;display:flex;flex-direction:column;overflow-x:hidden;
}

/* ── LOADING ── */
#loading{
  position:fixed;inset:0;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;z-index:999;transition:opacity .4s;
}
#loading.hide{opacity:0;pointer-events:none;}
.load-p{font-size:48px;font-weight:900;color:var(--cyan);letter-spacing:-2px;}
.load-bar{width:120px;height:2px;background:var(--border);border-radius:1px;overflow:hidden;}
.load-bar-fill{height:100%;background:var(--cyan);border-radius:1px;animation:loadbar 1.2s ease infinite;}
@keyframes loadbar{0%{width:0;margin-left:0}50%{width:80px;margin-left:0}100%{width:0;margin-left:120px}}

/* ── HEADER ── */
.hdr{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:14px 20px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;
}
.hdr-left{display:flex;align-items:center;gap:10px;}
.hdr-logo{font-size:20px;font-weight:900;color:var(--cyan);letter-spacing:-1px;}
.hdr-name{font-size:13px;font-weight:600;color:var(--text);}
.hdr-date{font-size:11px;color:var(--muted);margin-top:1px;}
.save-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);transition:all .4s;}
.save-dot.saving{background:var(--warn);box-shadow:0 0 6px var(--warn);animation:pulse 1s infinite;}
.save-dot.idle{background:var(--border);box-shadow:none;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── TABS ── */
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{
  flex:1;min-width:72px;padding:12px 8px;border:none;background:transparent;color:var(--muted);
  font-family:'Outfit',sans-serif;font-size:11px;font-weight:600;letter-spacing:1px;
  text-transform:uppercase;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;
}
.tab.active{color:var(--cyan);border-bottom-color:var(--cyan);}

/* ── PANELS ── */
.panel{display:none;padding:20px 16px 100px;flex:1;}
.panel.active{display:block;animation:fadeUp .25s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── SECTION ── */
.section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:14px;}
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.section-title{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
.badge{font-size:10px;font-weight:700;letter-spacing:1px;background:var(--cdim);border:1px solid rgba(0,209,255,.2);color:var(--cyan);padding:3px 8px;border-radius:20px;}

/* ── WATER ── */
.water-bar-wrap{background:var(--bg);border-radius:30px;height:12px;overflow:hidden;margin-bottom:14px;}
.water-bar-fill{height:100%;background:linear-gradient(90deg,#0099CC,var(--cyan));border-radius:30px;transition:width .5s ease;}
.water-btns{display:flex;gap:8px;flex-wrap:wrap;}
.btn-water{
  flex:1;min-width:70px;padding:10px 6px;background:var(--bg);border:1px solid var(--border);
  border-radius:var(--rs);color:var(--text);font-family:'Outfit',sans-serif;font-size:12px;
  font-weight:600;cursor:pointer;transition:all .2s;text-align:center;
}
.btn-water:hover{border-color:rgba(0,209,255,.4);color:var(--cyan);}
.water-total{text-align:center;font-size:28px;font-weight:800;color:var(--cyan);margin:10px 0 4px;letter-spacing:-1px;}
.water-total span{font-size:13px;font-weight:500;color:var(--muted);}

/* ── PESO META ── */
.weight-display{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:12px;}
.weight-current{font-size:32px;font-weight:800;color:var(--cyan);letter-spacing:-1px;}
.weight-current span{font-size:13px;font-weight:500;color:var(--muted);}
.weight-goal-info{text-align:right;}
.weight-goal-val{font-size:16px;font-weight:700;color:var(--muted);}
.weight-remaining{font-size:11px;color:var(--muted);margin-top:2px;}
.weight-input-row{display:flex;gap:8px;margin-top:12px;align-items:flex-end;}
.weight-input-wrap{flex:1;}
.weight-input-wrap label{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:5px;}

/* ── MEAL CARDS ── */
.meal-card{
  background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);
  padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px;
  cursor:pointer;transition:border-color .2s;
}
.meal-card:hover{border-color:rgba(0,209,255,.25);}
.meal-card.done{border-color:rgba(0,232,153,.2);background:rgba(0,232,153,.04);}
.meal-checkbox{
  width:22px;height:22px;border-radius:50%;border:2px solid var(--border);
  background:transparent;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .2s;font-size:12px;
}
.meal-card.done .meal-checkbox{background:var(--green);border-color:var(--green);color:#0D1117;}
.meal-info{flex:1;}
.meal-name{font-size:13px;font-weight:600;}
.meal-time{font-size:11px;color:var(--muted);margin-top:2px;}
.meal-desc{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.4;}
.meal-macros-badge{display:flex;gap:8px;margin-top:6px;}
.mbadge{font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;}
.mbadge.p{background:rgba(255,140,66,.12);color:#FF8C42;}
.mbadge.c{background:rgba(0,209,255,.10);color:var(--cyan);}
.mbadge.g{background:rgba(0,232,153,.10);color:var(--green);}

/* ── SUPPS ── */
.supp-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.supp-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);padding:12px;text-align:center;cursor:pointer;transition:all .2s;}
.supp-card:hover{border-color:rgba(0,209,255,.25);}
.supp-card.done{border-color:rgba(0,232,153,.2);background:rgba(0,232,153,.04);}
.supp-icon{font-size:22px;margin-bottom:4px;}
.supp-name{font-size:12px;font-weight:600;}
.supp-time{font-size:10px;color:var(--muted);margin-top:2px;}

/* ── CARDIO ── */
.cardio-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.cardio-stat{background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);padding:12px;text-align:center;}
.cardio-stat-val{font-size:22px;font-weight:800;color:var(--cyan);}
.cardio-stat-label{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:2px;}
.cardio-input-row{display:flex;gap:8px;margin-bottom:8px;}
.cardio-input-wrap{flex:1;display:flex;flex-direction:column;gap:5px;}
.cardio-input-wrap label{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
input[type=number],input[type=text],select{
  background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);
  padding:10px 12px;color:var(--text);font-family:'Outfit',sans-serif;font-size:13px;
  outline:none;transition:border-color .2s,box-shadow .2s;width:100%;
}
input:focus,select:focus{border-color:rgba(0,209,255,.5);box-shadow:0 0 0 3px var(--cdim);}
input::placeholder{color:var(--muted);opacity:.5;}
select option{background:var(--surface2);}

/* ── STREAK ── */
.streak-display{text-align:center;padding:20px 0;}
.streak-num{font-size:56px;font-weight:900;color:var(--cyan);line-height:1;letter-spacing:-3px;}
.streak-label{font-size:12px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:4px;}
.streak-fire{font-size:28px;margin-bottom:4px;}
.week-grid{display:flex;gap:6px;justify-content:center;margin-top:16px;}
.week-dot{
  width:32px;height:32px;border-radius:50%;background:var(--bg);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;
  color:var(--muted);flex-direction:column;gap:2px;
}
.week-dot.active{background:var(--cdim);border-color:rgba(0,209,255,.3);color:var(--cyan);}
.week-dot.today{background:var(--cyan);border-color:var(--cyan);color:#0D1117;}

/* ── BTN ── */
.btn{
  width:100%;padding:13px;background:var(--cyan);color:#0D1117;border:none;border-radius:var(--rs);
  font-family:'Outfit',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;
  text-transform:uppercase;cursor:pointer;transition:opacity .2s,transform .15s;margin-top:8px;
}
.btn:hover{opacity:.9;}
.btn:active{transform:scale(.98);}
.btn.outline{background:transparent;color:var(--muted);border:1px solid var(--border);}
.btn.outline:hover{color:var(--text);}

/* ── MACROS ── */
.macro-row{display:flex;gap:8px;margin-top:12px;}
.macro-item{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);padding:10px;text-align:center;}
.macro-val{font-size:18px;font-weight:800;}
.macro-val.p{color:#FF8C42;}
.macro-val.c{color:var(--cyan);}
.macro-val.g{color:var(--green);}
.macro-lbl{font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:2px;}

/* ── PROGRESS BAR ── */
.prog-label{display:flex;justify-content:space-between;font-size:11px;margin-bottom:5px;}
.prog-label span:first-child{color:var(--muted);}
.prog-label span:last-child{font-weight:600;}
.prog-bar{background:var(--bg);border-radius:20px;height:6px;overflow:hidden;margin-bottom:10px;}
.prog-fill{height:100%;border-radius:20px;transition:width .5s;}

/* ── DIETA TAB ── */
.diet-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);padding:14px;margin-bottom:10px;}
.diet-card-hdr{font-size:12px;font-weight:700;color:var(--cyan);margin-bottom:8px;letter-spacing:.5px;}
.diet-card-desc{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:8px;}
.diet-macros{display:flex;gap:8px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);}
.diet-macro{font-size:11px;font-weight:600;padding:3px 8px;border-radius:4px;}
.diet-macro.p{background:rgba(255,140,66,.12);color:#FF8C42;}
.diet-macro.c{background:rgba(0,209,255,.10);color:var(--cyan);}
.diet-macro.g{background:rgba(0,232,153,.10);color:var(--green);}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--surface2);border:1px solid var(--border);border-radius:8px;
  padding:10px 18px;font-size:12px;font-weight:500;opacity:0;transition:all .3s;
  pointer-events:none;z-index:200;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.4);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.ok{border-color:rgba(0,232,153,.3);color:var(--green);}
.toast.err{border-color:rgba(255,90,90,.3);color:var(--red);}
</style>
</head>
<body>

<div id="loading">
  <div class="load-p">P</div>
  <div class="load-bar"><div class="load-bar-fill"></div></div>
</div>

<div class="hdr">
  <div class="hdr-left">
    <div class="hdr-logo">P</div>
    <div>
      <div class="hdr-name" id="hdr-name">Carregando...</div>
      <div class="hdr-date" id="hdr-date"></div>
    </div>
  </div>
  <div class="save-dot idle" id="save-dot" title="Status de sincronização"></div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('hoje')">Hoje</button>
  <button class="tab" onclick="switchTab('dieta')">Dieta</button>
  <button class="tab" onclick="switchTab('peso')">Peso</button>
  <button class="tab" onclick="switchTab('cardio')">Cardio</button>
  <button class="tab" onclick="switchTab('streak')">Streak</button>
</div>

<!-- TAB HOJE -->
<div class="panel active" id="panel-hoje">

  <div class="section">
    <div class="section-hdr">
      <div class="section-title">💧 Hidratação</div>
      <div class="badge" id="water-pct">0%</div>
    </div>
    <div class="water-total" id="water-display">0 <span>/ <span id="water-goal-label">3000</span> ml</span></div>
    <div class="water-bar-wrap"><div class="water-bar-fill" id="water-bar" style="width:0%"></div></div>
    <div class="water-btns">
      <button class="btn-water" onclick="addWater(150)">☕ 150ml</button>
      <button class="btn-water" onclick="addWater(250)">🥤 250ml</button>
      <button class="btn-water" onclick="addWater(300)">🫙 300ml</button>
      <button class="btn-water" onclick="addWater(500)">🍶 500ml</button>
    </div>
    <button class="btn outline" style="margin-top:10px;font-size:11px;padding:8px;" onclick="resetWater()">Zerar água</button>
  </div>

  <div class="section">
    <div class="section-hdr">
      <div class="section-title">🍽️ Refeições</div>
      <div class="badge" id="meals-badge">0/0</div>
    </div>
    <div id="meals-list"></div>
  </div>

  <div class="section">
    <div class="section-hdr">
      <div class="section-title">💊 Suplementos</div>
      <div class="badge" id="supps-badge">0/0</div>
    </div>
    <div class="supp-grid" id="supps-grid"></div>
  </div>

  <div class="section">
    <div class="section-hdr"><div class="section-title">📊 Macros do dia</div></div>
    <div id="macros-bars"></div>
    <div class="macro-row">
      <div class="macro-item"><div class="macro-val p" id="m-prot">0g</div><div class="macro-lbl">Proteína</div></div>
      <div class="macro-item"><div class="macro-val c" id="m-carb">0g</div><div class="macro-lbl">Carbo</div></div>
      <div class="macro-item"><div class="macro-val g" id="m-fat">0g</div><div class="macro-lbl">Gordura</div></div>
    </div>
  </div>

</div>

<!-- TAB DIETA -->
<div class="panel" id="panel-dieta">
  <div id="diet-content"></div>
</div>

<!-- TAB PESO -->
<div class="panel" id="panel-peso">
  <div class="section">
    <div class="section-hdr"><div class="section-title">⚖️ Peso atual</div></div>
    <div class="weight-display">
      <div>
        <div class="weight-current" id="w-current">—<span>kg</span></div>
        <div style="font-size:11px;color:var(--muted);margin-top:4px;">peso atual</div>
      </div>
      <div class="weight-goal-info">
        <div class="weight-goal-val" id="w-goal">— kg</div>
        <div class="weight-remaining" id="w-remaining">meta</div>
      </div>
    </div>
    <div class="prog-bar" style="margin:8px 0 12px;">
      <div class="prog-fill" id="w-bar" style="width:0%;background:var(--cyan);"></div>
    </div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:12px;" id="w-diff"></div>
    <div class="weight-input-row">
      <div class="weight-input-wrap">
        <label>Registrar peso hoje (kg)</label>
        <input type="number" id="w-input" placeholder="68.5" step="0.1" min="30" max="300"/>
      </div>
      <button class="btn" style="margin-top:0;width:auto;padding:10px 20px;" onclick="saveWeight()">Salvar</button>
    </div>
  </div>

  <div class="section">
    <div class="section-hdr"><div class="section-title">📅 Histórico de peso</div></div>
    <div id="weight-history"></div>
  </div>
</div>

<!-- TAB CARDIO -->
<div class="panel" id="panel-cardio">
  <div class="section">
    <div class="section-hdr"><div class="section-title">🏃 Treino de hoje</div></div>
    <div class="cardio-grid">
      <div class="cardio-stat"><div class="cardio-stat-val" id="c-dur">0</div><div class="cardio-stat-label">Minutos</div></div>
      <div class="cardio-stat"><div class="cardio-stat-val" id="c-kcal">0</div><div class="cardio-stat-label">Kcal</div></div>
    </div>
    <div class="cardio-input-row">
      <div class="cardio-input-wrap">
        <label>Tipo</label>
        <select id="c-type">
          <option value="Caminhada">Caminhada</option>
          <option value="Corrida">Corrida</option>
          <option value="Bike">Bike</option>
          <option value="Musculação">Musculação</option>
          <option value="Natação">Natação</option>
          <option value="HIIT">HIIT</option>
          <option value="Outro">Outro</option>
        </select>
      </div>
    </div>
    <div class="cardio-input-row">
      <div class="cardio-input-wrap">
        <label>Duração (min)</label>
        <input type="number" id="c-dur-in" placeholder="30" min="1" max="300"/>
      </div>
      <div class="cardio-input-wrap">
        <label>Kcal queimadas</label>
        <input type="number" id="c-kcal-in" placeholder="250" min="0" max="3000"/>
      </div>
    </div>
    <input type="text" id="c-obs" placeholder="Observações (opcional)" style="margin-bottom:8px;"/>
    <button class="btn" onclick="saveCardio()">Registrar Treino</button>
  </div>
</div>

<!-- TAB STREAK -->
<div class="panel" id="panel-streak">
  <div class="section">
    <div class="streak-display">
      <div class="streak-fire">🔥</div>
      <div class="streak-num" id="streak-num">0</div>
      <div class="streak-label">dias seguidos</div>
    </div>
    <div class="week-grid" id="week-grid"></div>
  </div>
  <div class="section">
    <div class="section-hdr"><div class="section-title">📈 Resumo de hoje</div></div>
    <div id="week-summary"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp }    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, onAuthStateChanged }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot, serverTimestamp }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey:"AIzaSyD_HNctj6rWde8LhGZ3diI0Dv836ETSXBE",
  authDomain:"performance-c506c.firebaseapp.com",
  projectId:"performance-c506c",
  storageBucket:"performance-c506c.firebasestorage.app",
  messagingSenderId:"409852210861",
  appId:"1:409852210861:web:f4d6cb4330b154a495e024"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

const params     = new URLSearchParams(location.search);
let profile      = null;
let todayLog     = null;
let saveTimer    = null;
let _loading     = false; // guard contra chamada dupla
const TODAY      = new Date().toISOString().slice(0,10);

onAuthStateChanged(auth, async (user) => {
  if(_loading) return; // evita carregar duas vezes
  const paramId    = params.get('p');
  const resolvedId = paramId || (user ? user.uid : null);
  if(!resolvedId){
    showError('Link inválido. Solicite o link correto ao seu Nutricionista.');
    return;
  }
  _loading = true;
  window._PATIENT_ID = resolvedId;
  loadPatient(resolvedId);
});

async function loadPatient(pid){
  try{
    const snap = await getDoc(doc(db,'patients',pid));
    if(!snap.exists()){ showError('Paciente não encontrado.'); return; }
    profile = snap.data();

    const hdrName = document.getElementById('hdr-name');
    const hdrDate = document.getElementById('hdr-date');
    if(hdrName) hdrName.textContent = profile.name || pid;
    if(hdrDate) hdrDate.textContent = formatDate(new Date());

    const logRef  = doc(db,'logs',`${pid}_${TODAY}`);
    const logSnap = await getDoc(logRef);
    if(logSnap.exists()){
      todayLog = logSnap.data();
    } else {
      todayLog = buildEmptyLog(pid);
      // serverTimestamp() apenas no Firestore — não fica no objeto local
      await setDoc(logRef, { ...todayLog, createdAt: serverTimestamp() });
    }

    renderAll();
    hideLoading();
    updateStreakInBackground(pid);
  } catch(e){
    showError('Erro ao carregar: ' + e.message);
  }
}

function buildEmptyLog(pid){
  const meals = (profile.meals||[]).map(m=>({...m, done:false}));
  const supps = (profile.supps||[]).map(s=>({...s, done:false}));
  // serverTimestamp() NÃO incluído aqui — só vai para o Firestore no setDoc
  return {
    patientId:  pid,
    date:       TODAY,
    waterMl:    0,
    meals,
    supps,
    cardio:     null,
    weightKg:   null,
    macrosDone: { proteinG:0, carbsG:0, fatG:0 },
  };
}

// ── HELPERS DOM — evita erro de null em qualquer elemento ──
function $el(id){ return document.getElementById(id); }
function $set(id, val){ const e=$el(id); if(e) e.textContent=String(val); }
function $html(id, val){ const e=$el(id); if(e) e.innerHTML=val; }
function $style(id, prop, val){ const e=$el(id); if(e) e.style[prop]=val; }

// ── RENDER ────────────────────────────────────────────────
function renderAll(){
  try { renderWater();  } catch(e){ console.warn('renderWater',e); }
  try { renderMeals();  } catch(e){ console.warn('renderMeals',e); }
  try { renderSupps();  } catch(e){ console.warn('renderSupps',e); }
  try { renderMacros(); } catch(e){ console.warn('renderMacros',e); }
  try { renderDiet();   } catch(e){ console.warn('renderDiet',e); }
  try { renderWeight(); } catch(e){ console.warn('renderWeight',e); }
  try { renderStreak(); } catch(e){ console.warn('renderStreak',e); }
}

function renderWater(){
  const cur  = todayLog.waterMl || 0;
  const goal = profile.goals?.waterMl || 3000;
  const pct  = Math.min(100, Math.round(cur/goal*100));
  $html('water-display', `${cur} <span>/ ${goal} ml</span>`);
  $style('water-bar', 'width', pct+'%');
  $set('water-pct', pct+'%');
  $set('water-goal-label', goal);
}

function renderMeals(){
  const meals = todayLog.meals || [];
  const done  = meals.filter(m=>m.done).length;
  $set('meals-badge', `${done}/${meals.length}`);
  $html('meals-list', meals.map((m,i)=>{
    const hasM = m.proteinG || m.carbsG || m.fatG;
    return `
      <div class="meal-card${m.done?' done':''}" onclick="toggleMeal(${i})">
        <div class="meal-checkbox">${m.done?'✓':''}</div>
        <div class="meal-info">
          <div class="meal-name">${m.name||'Refeição '+(i+1)}</div>
          <div class="meal-time">${m.time||''}</div>
          ${m.desc?`<div class="meal-desc">${m.desc}</div>`:''}
          ${hasM?`<div class="meal-macros-badge">
            ${m.proteinG?`<span class="mbadge p">P ${m.proteinG}g</span>`:''}
            ${m.carbsG  ?`<span class="mbadge c">C ${m.carbsG}g</span>`:''}
            ${m.fatG    ?`<span class="mbadge g">G ${m.fatG}g</span>`:''}
          </div>`:''}
        </div>
      </div>
    `;
  }).join('') || '<div style="font-size:13px;color:var(--muted);text-align:center;padding:16px;">Nenhuma refeição configurada.</div>');
}

function renderSupps(){
  const supps = todayLog.supps || [];
  const done  = supps.filter(s=>s.done).length;
  $set('supps-badge', `${done}/${supps.length}`);
  $html('supps-grid', supps.map((s,i)=>`
    <div class="supp-card${s.done?' done':''}" onclick="toggleSupp(${i})">
      <div class="supp-icon">${s.icon||'💊'}</div>
      <div class="supp-name">${s.name||'Suplemento'}</div>
      <div class="supp-time">${s.time||''}</div>
    </div>
  `).join('') || '<div style="font-size:13px;color:var(--muted);grid-column:span 2;text-align:center;padding:12px;">Nenhum suplemento configurado.</div>');
}

// ── MACROS — recalcula somando refeições marcadas ──
function recalcMacros(){
  const meals = todayLog.meals || [];
  let p=0, c=0, g=0;
  meals.forEach(m => {
    if(m.done){ p += m.proteinG||0; c += m.carbsG||0; g += m.fatG||0; }
  });
  todayLog.macrosDone = { proteinG:p, carbsG:c, fatG:g };
}

function renderMacros(){
  const macros = profile.goals?.macros || {};
  const done   = todayLog.macrosDone   || {};
  const fields = [
    {key:'proteinG', label:'Proteína', color:'#FF8C42',     id:'m-prot'},
    {key:'carbsG',   label:'Carbo',    color:'var(--cyan)',  id:'m-carb'},
    {key:'fatG',     label:'Gordura',  color:'var(--green)', id:'m-fat'},
  ];
  $html('macros-bars', fields.map(f=>{
    const goal = macros[f.key]||0;
    const cur  = done[f.key] ||0;
    const pct  = goal>0 ? Math.min(100,Math.round(cur/goal*100)) : 0;
    return `
      <div class="prog-label"><span>${f.label}</span><span>${cur}/${goal}g</span></div>
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${f.color};"></div></div>
    `;
  }).join(''));
  $set('m-prot', (done.proteinG||0)+'g');
  $set('m-carb', (done.carbsG||0)+'g');
  $set('m-fat',  (done.fatG||0)+'g');
}

// ── DIETA ─────────────────────────────────────────────────
function renderDiet(){
  const meals = profile.meals || [];
  if(!meals.length){
    $html('diet-content','<div style="text-align:center;padding:40px 20px;color:var(--muted);font-size:13px;">Dieta não configurada ainda.<br/>Aguarde seu nutricionista.</div>');
    return;
  }
  $html('diet-content', meals.map(m=>{
    const hasM = m.proteinG || m.carbsG || m.fatG;
    return `
      <div class="diet-card">
        <div class="diet-card-hdr">🕐 ${m.name||'Refeição'} ${m.time?'— '+m.time:''}</div>
        ${m.desc?`<div class="diet-card-desc">${m.desc}</div>`:''}
        ${hasM?`<div class="diet-macros">
          ${m.proteinG?`<span class="diet-macro p">Prot ${m.proteinG}g</span>`:''}
          ${m.carbsG  ?`<span class="diet-macro c">Carb ${m.carbsG}g</span>`:''}
          ${m.fatG    ?`<span class="diet-macro g">Gord ${m.fatG}g</span>`:''}
        </div>`:''}
      </div>
    `;
  }).join(''));
}

// ── PESO ──────────────────────────────────────────────────
function renderWeight(){
  const cur   = todayLog.weightKg || profile.goals?.weightKg || null;
  const goalW = profile.goals?.weightGoalKg || null;

  $html('w-current', cur ? `${cur}<span>kg</span>` : `—<span>kg</span>`);

  if(goalW){
    $set('w-goal', goalW+' kg');
    if(cur){
      const diff   = Math.abs(cur - goalW).toFixed(1);
      const start  = profile.goals?.weightKg || cur;
      const total  = Math.abs(start - goalW);
      const progr  = total > 0 ? Math.max(0, Math.min(100, Math.round((Math.abs(start-cur)/total)*100))) : 0;
      $style('w-bar','width', progr+'%');
      $set('w-diff', cur > goalW ? `Faltam ${diff}kg para atingir a meta` : '🎉 Meta de peso atingida!');
      $set('w-remaining', `faltam ${diff}kg`);
    }
  } else {
    $set('w-goal','— kg');
    $set('w-remaining','meta não definida');
  }

  const hist = profile.weightHistory || [];
  $html('weight-history', hist.length
    ? hist.slice(-7).reverse().map(h=>`
        <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;">
          <span style="color:var(--muted);">${h.date}</span>
          <span style="font-weight:600;">${h.kg} kg</span>
        </div>`).join('')
    : '<div style="font-size:13px;color:var(--muted);text-align:center;padding:16px;">Nenhum registro ainda.</div>');
}

function renderStreak(){
  const streak = profile.streak || 0;
  $set('streak-num', streak);
  const days  = ['D','S','T','Q','Q','S','S'];
  const today = new Date().getDay();
  $html('week-grid', days.map((d,i)=>`
    <div class="week-dot ${i===today?'today':i<today?'active':''}"><span>${d}</span></div>
  `).join(''));
  const meals = todayLog.meals||[];
  const supps = todayLog.supps||[];
  $html('week-summary',`
    <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px;"><span style="color:var(--muted);">💧 Água</span><span>${todayLog.waterMl||0} ml</span></div>
    <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px;"><span style="color:var(--muted);">🍽️ Refeições</span><span>${meals.filter(m=>m.done).length}/${meals.length}</span></div>
    <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px;"><span style="color:var(--muted);">💊 Suplementos</span><span>${supps.filter(s=>s.done).length}/${supps.length}</span></div>
    <div style="display:flex;justify-content:space-between;padding:8px 0;font-size:12px;"><span style="color:var(--muted);">🏃 Cardio</span><span>${todayLog.cardio?todayLog.cardio.durationMin+'min':'—'}</span></div>
  `);
}

// ── ACTIONS ───────────────────────────────────────────────
window.addWater = function(ml){
  todayLog.waterMl = (todayLog.waterMl||0) + ml;
  renderWater();
  scheduleSave();
  const goal = profile.goals?.waterMl||3000;
  if(todayLog.waterMl>=goal) showToast('🎉 Meta de água atingida!','ok');
};

window.resetWater = function(){
  todayLog.waterMl = 0;
  renderWater();
  scheduleSave();
};

// ── toggleMeal — recalcula macros automaticamente ──
window.toggleMeal = function(i){
  todayLog.meals[i].done = !todayLog.meals[i].done;
  recalcMacros();
  renderMeals();
  renderMacros();
  scheduleSave();
  if(todayLog.meals[i].done) showToast('✅ '+todayLog.meals[i].name,'ok');
};

window.toggleSupp = function(i){
  todayLog.supps[i].done = !todayLog.supps[i].done;
  renderSupps();
  scheduleSave();
  if(todayLog.supps[i].done) showToast('💊 '+todayLog.supps[i].name,'ok');
};

window.saveCardio = function(){
  const dur  = parseInt(document.getElementById('c-dur-in').value)||0;
  const kcal = parseInt(document.getElementById('c-kcal-in').value)||0;
  const type = document.getElementById('c-type').value;
  const obs  = document.getElementById('c-obs').value.trim();
  if(!dur){ showToast('Informe a duração.','err'); return; }
  todayLog.cardio = { type, durationMin:dur, kcal, obs, savedAt:TODAY };
  document.getElementById('c-dur').textContent  = dur;
  document.getElementById('c-kcal').textContent = kcal;
  scheduleSave();
  showToast('🏃 Treino registrado!','ok');
};

window.saveWeight = async function(){
  const kg  = parseFloat(document.getElementById('w-input').value);
  if(!kg || kg < 30 || kg > 300){ showToast('Peso inválido.','err'); return; }
  const pid = window._PATIENT_ID;

  todayLog.weightKg = kg;

  // Adiciona ao histórico no perfil do paciente
  const hist = profile.weightHistory || [];
  const idx  = hist.findIndex(h=>h.date===TODAY);
  if(idx>=0) hist[idx].kg = kg;
  else hist.push({date:TODAY, kg});
  profile.weightHistory = hist;
  profile.goals         = profile.goals || {};
  profile.goals.weightKg = kg;

  await updateDoc(doc(db,'patients',pid),{
    weightHistory:     hist,
    'goals.weightKg':  kg,
  });

  renderWeight();
  scheduleSave();
  showToast('⚖️ Peso registrado!','ok');
};

// ── SAVE ──────────────────────────────────────────────────
function scheduleSave(){
  setSaveDot('saving');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(doSave, 1200);
}

async function doSave(){
  const pid = window._PATIENT_ID;
  try{
    await setDoc(doc(db,'logs',`${pid}_${TODAY}`),{
      ...todayLog, updatedAt: serverTimestamp()
    });
    setSaveDot('active');
    setTimeout(()=>setSaveDot('idle'),3000);
  } catch(e){
    setSaveDot('idle');
    showToast('Erro ao salvar.','err');
  }
}

function setSaveDot(state){
  const d = document.getElementById('save-dot');
  if(d) d.className = 'save-dot '+state;
}

async function updateStreakInBackground(pid){
  const lastActive = profile.lastActiveDate;
  if(lastActive === TODAY) return;
  const yesterday = new Date();
  yesterday.setDate(yesterday.getDate()-1);
  const yStr      = yesterday.toISOString().slice(0,10);
  const newStreak = (lastActive===yStr) ? (profile.streak||0)+1 : 1;
  profile.streak          = newStreak;
  profile.lastActiveDate  = TODAY;
  await updateDoc(doc(db,'patients',pid),{streak:newStreak, lastActiveDate:TODAY});
  renderStreak();
}

// ── UI ────────────────────────────────────────────────────
window.switchTab = function(name){
  document.querySelectorAll('.tab').forEach((t,i)=>{
    const names=['hoje','dieta','peso','cardio','streak'];
    t.classList.toggle('active', names[i]===name);
  });
  document.querySelectorAll('.panel').forEach(p=>{
    p.classList.toggle('active', p.id===`panel-${name}`);
  });
};

function hideLoading(){
  const l = $el("loading");
  if(!l) return;
  l.classList.add("hide");
  setTimeout(()=>{ if(l) l.style.display="none"; },400);
}

function showError(msg){
  const l = $el("loading");
  if(!l) return;
  l.style.display = "flex";
  l.classList.remove("hide");
  l.innerHTML = "<div style=\"text-align:center;padding:24px;max-width:280px;\"><div style=\"font-size:32px;margin-bottom:12px;\">⚠️</div><div style=\"font-size:14px;color:var(--muted);line-height:1.5;\">"+msg+"</div></div>";
}

function formatDate(d){
  return d.toLocaleDateString("pt-BR",{weekday:"long",day:"numeric",month:"long"});
}

let toastTimer;
window.showToast = function(msg,type=""){
  const t = $el("toast");
  if(!t) return;
  t.textContent = msg;
  t.className   = "toast show "+type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{ const x=$el("toast"); if(x) x.className="toast"; },3000);
};
</script>
</body>
</html>
